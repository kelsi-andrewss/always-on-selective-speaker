<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontier Audio — Transcript Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen" class="screen">
        <div class="login-card">
            <div class="brand-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: white; margin-bottom: 16px;">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="22"></line>
                </svg>
            </div>
            <h1>Frontier Audio</h1>
            <p class="subtitle">Supervisor Dashboard</p>
            <button type="button" id="google-login-btn" class="google-btn">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.9 23.9 0 0 0 0 24c0 3.77.9 7.34 2.56 10.51l7.97-5.92z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.92C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Sign in with Google
            </button>
            <p id="login-error" class="error" hidden></p>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="screen" hidden>
        <nav>
            <div class="header-left">
                <span class="nav-brand">Frontier Audio</span>
                <span id="auto-refresh-indicator" class="refresh-badge">Auto-refresh: 30s</span>
            </div>
            <div class="header-right">
                <span id="user-email"></span>
                <button id="logout-btn">Sign Out</button>
            </div>
        </nav>

        <div class="filters">
            <label>
                From
                <input type="date" id="filter-start">
            </label>
            <label>
                To
                <input type="date" id="filter-end">
            </label>
            <button id="filter-btn">Filter</button>
            <button id="clear-filter-btn" class="secondary">Clear</button>
        </div>

        <div id="transcript-list" class="transcript-list">
            <p class="placeholder">Loading transcripts...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
